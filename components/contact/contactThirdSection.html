<section class="contact-third-sec contact-intersecting">
  <div class="contact-sub-con">
    <div class="third-details-con">
      <div class="upper-divider">
        <img src="./images/contact/thirdSection/rose.svg" alt="rose-icon" />
      </div>
      <div class="get-in-touch-title">Get in Touch</div>
      <div class="get-in-touch-title title-second">
        With Us
        <img
          src="./images/contact/thirdSection/sunflower.svg"
          alt="sunflower-icon"
        />
      </div>
      <div class="get-in-touch-text">
        <p>Have a question, feedback, or special request?</p>
        <p>We'd love to hear from you!</p>
        <p>Fill out the form or reach us through any of the channels below.</p>
      </div>
      <ul class="contact-channels">
        <li>
          <a href="#"
            ><img
              src="./images/contact/thirdSection/facebook.svg"
              alt="facebook-link"
          /></a>
        </li>
        <li>
          <a href="#"
            ><img
              src="./images/contact/thirdSection/linkedin.svg"
              alt="linked-link"
          /></a>
        </li>
        <li>
          <a href="#"
            ><img
              src="./images/contact/thirdSection/instagram.svg"
              alt="instagram-link"
          /></a>
        </li>
        <li>
          <a
            href="mailto:hello@bloomandblossom.com?subject=Flos%20%26%20Florere%20Inquiry"
            ><img src="./images/contact/thirdSection/email.svg" alt="mail-link"
          /></a>
        </li>
      </ul>
    </div>
    <div class="third-form-con">
      <img src="./images/contact/thirdSection/lily.svg" alt="lily-icon" />
      <span>Send Us a Message</span>
      <div class="form-divider">
        <img src="./images/index/fourthSection/heart.svg" alt="heart-icon" />
      </div>
      <form id="get-in-touch" class="contact-form">
        <input type="hidden" name="formType" value="message" />
        <div>
          <img
            src="./images/contact/thirdSection/person.svg"
            alt="person-icon"
            class="background-icon"
          />
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Your Name"
            required
          />
        </div>
        <div>
          <img
            src="./images/contact/thirdSection/mail.svg"
            alt="mail-icon"
            class="background-icon"
          />
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Your Email Address"
            required
          />
        </div>
        <div>
          <img
            src="./images/contact/thirdSection/phone.svg"
            alt="phone-icon"
            class="background-icon"
          />
          <input
            type="text"
            name="phone"
            id="phone"
            placeholder="Phone Number"
            required
          />
        </div>
        <div>
          <img
            src="./images/contact/thirdSection/text.svg"
            alt="text-document-icon"
            class="background-icon"
          />
          <input
            type="text"
            name="subject"
            id="subject"
            placeholder="Subject"
            required
          />
        </div>
        <div>
          <img
            src="./images/contact/thirdSection/pencil.svg"
            alt="pencil-icon"
            class="textarea-background-icon"
          />
          <textarea
            name="message"
            placeholder="Your Message"
            id="message"
            required
          ></textarea>
        </div>
        <input type="text" name="website" class="honeypot" />
        <button type="submit" class="send-button">
          <span class="send-btn-text">Send</span>
        </button>
      </form>
      <div class="form-divider">
        <img src="./images/index/fourthSection/heart.svg" alt="heart-icon" />
      </div>
      <p>We appreciate your message and will get back to you soon.</p>
    </div>
  </div>

  <img
    src="./images/contact/thirdSection/contact-third-banner.png"
    alt="third-banner-image"
    class="contact-third-banner"
  />
</section>
